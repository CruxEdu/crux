<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUX | Progressive Lifecycle Mastery Matrix</title>
    <style>
        :root {
            --bg-main: #090d16;
            --bg-surface: #131926;
            --bg-card: #1e2638;
            --border-color: #26334d;
            --text-main: #f3f4f6;
            --text-muted: #94a3b8;
            --cbse-color: #f87171;
            --cbse-glow: rgba(248, 113, 113, 0.15);
            --crux-color: #2dd4bf;
            --crux-glow: rgba(45, 212, 191, 0.15);
            --accent-blue: #38bdf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* App Layout Sidebar */
        .sidebar {
            width: 280px;
            background-color: var(--bg-surface);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
        }

        .brand {
            padding: 2rem 1.5rem;
            border-bottom: 1px solid var(--border-color);
        }

        .brand h1 {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, var(--accent-blue), var(--crux-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .brand p {
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        .phase-navigation {
            padding: 1.5rem 1rem;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            overflow-y: auto;
        }

        .phase-btn {
            background: transparent;
            border: none;
            color: var(--text-muted);
            padding: 0.85rem 1rem;
            border-radius: 8px;
            text-align: left;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
        }

        .phase-btn span:last-child {
            font-size: 0.75rem;
            font-weight: 400;
            opacity: 0.7;
        }

        .phase-btn:hover {
            background: rgba(255, 255, 255, 0.03);
            color: var(--text-main);
        }

        .phase-btn.active {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-blue);
            border-left: 3px solid var(--accent-blue);
        }

        /* Main View Window */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Age Timeline Navigation Sub-Bar */
        .timeline-bar {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-color);
            padding: 0.75rem 2rem;
            display: flex;
            align-items: center;
            gap: 1rem;
            overflow-x: auto;
            scrollbar-width: none;
        }
        .timeline-bar::-webkit-scrollbar { display: none; }

        .age-btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-muted);
            padding: 0.5rem 1.25rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s ease;
        }

        .age-btn:hover {
            border-color: var(--text-muted);
            color: var(--text-main);
        }

        .age-btn.active {
            background: var(--crux-color);
            color: var(--bg-main);
            border-color: var(--crux-color);
            box-shadow: 0 0 15px var(--crux-glow);
        }

        /* Content Scrollspace */
        .workspace {
            flex-grow: 1;
            overflow-y: auto;
            padding: 2.5rem;
        }

        .view-header {
            margin-bottom: 2rem;
        }
        .view-header h2 {
            font-size: 2rem;
            font-weight: 700;
            letter-spacing: -0.03em;
        }
        .view-header p {
            color: var(--text-muted);
            margin-top: 0.25rem;
        }

        /* Comparison Split Layout Matrix */
        .matrix-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2.5rem;
            align-items: start;
        }

        .matrix-column {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .matrix-column h3 {
            font-size: 1.25rem;
            font-weight: 700;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--border-color);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .legacy-title { color: var(--cbse-color); }
        .crux-title { color: var(--crux-color); }

        /* Dynamic Subject Cards */
        .subject-card {
            background: var(--bg-surface);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .subject-card:hover {
            transform: translateY(-2px);
        }
        .legacy-card:hover { border-color: var(--cbse-color); box-shadow: 0 8px 24px var(--cbse-glow); }
        .crux-card:hover { border-color: var(--crux-color); box-shadow: 0 8px 24px var(--crux-glow); }

        .card-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }

        .subject-name {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--text-main);
        }

        .tag {
            font-size: 0.7rem;
            text-transform: uppercase;
            font-weight: 700;
            letter-spacing: 0.05em;
            padding: 0.2rem 0.6rem;
            border-radius: 4px;
        }
        .legacy-tag { background: rgba(248, 113, 113, 0.1); color: var(--cbse-color); }
        .crux-tag { background: rgba(45, 212, 191, 0.1); color: var(--crux-color); }

        .card-body {
            font-size: 0.95rem;
            color: #cbd5e1;
        }

        /* Responsive Layout Overrides */
        @media (max-width: 1024px) {
            body { flex-direction: column; overflow: auto; height: auto; }
            .sidebar { width: 100%; height: auto; border-right: none; border-bottom: 1px solid var(--border-color); }
            .phase-navigation { flex-direction: row; overflow-x: auto; }
            .main-content { height: auto; }
            .matrix-grid { grid-template-columns: 1fr; gap: 1.5rem; }
            .workspace { padding: 1.5rem; }
        }
    </style>
</head>
